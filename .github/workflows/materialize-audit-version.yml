name: Materialize audit version rule

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]
    paths:
      - ".tmp_manual_economy/audit_version.patch"
      - ".github/workflows/materialize-audit-version.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/unify-manual-auto-economy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Replace version-specific assertion
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/audit_project_operating_system.py")
          text = path.read_text(encoding="utf-8")
          old = '("POC v0.6.0", "자동 단조", "+11", "+30")'
          new = '("POC v", "자동 단조", "+11", "+30")'
          if text.count(old) != 1:
              raise SystemExit(f"expected exactly one old assertion, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

          grep -F '("POC v", "자동 단조", "+11", "+30")' tools/audit_project_operating_system.py
          ! grep -F 'POC v0.6.0' tools/audit_project_operating_system.py

          rm -rf .tmp_manual_economy
          rm -f .github/workflows/materialize-audit-version.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "운영 감사의 버전 번호 고정 제거"
          git push origin HEAD:${{ github.head_ref }}
