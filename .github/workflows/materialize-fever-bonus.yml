name: Materialize fever bonus

on:
  push:
    branches:
      - agent/forging-fever-result-poc064
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/forging-fever-result-poc064
          fetch-depth: 0

      - name: Apply exact patch
        run: python tools/apply_fever_bonus_patch.py

      - name: Validate patch before commit
        run: |
          python -m py_compile tools/apply_fever_bonus_patch.py tests/check_forging_quality_contract.py
          python tools/validate_game_data.py
          python tests/check_forging_quality_contract.py
          git diff --check

      - name: Remove one-time patch tool
        run: rm tools/apply_fever_bonus_patch.py

      - name: Commit materialized changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo "No materialized changes"; exit 1; }
          git commit -m "제작 피버 결과 보너스와 정본 계약 통합"
          git push origin HEAD:agent/forging-fever-result-poc064
