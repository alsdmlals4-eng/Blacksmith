name: Data validation

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "data/**"
      - "tools/**"
      - "tests/check_enhancement_failure_contract.py"
      - "skills/**"
      - "docs/**"
      - "[기획서]/**"
      - "README.md"
      - ".github/workflows/data-validation.yml"

jobs:
  validate-game-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
      - name: Checkout pinned Base
        uses: actions/checkout@v4
        with:
          repository: alsdmlals4-eng/Base
          ref: ee265576da7f67d3278f8099dd97d4e714ef0651
          path: .base-source
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up Node and pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Validate JSON game data
        run: python tools/validate_game_data.py
      - name: Validate enhancement failure contract
        run: python tests/check_enhancement_failure_contract.py
      - name: Audit pristine Base adoption and project references
        run: python tools/audit_project_operating_system.py --base-root .base-source --report-output project-operating-system-report.json
      - name: Install pinned Base regression dependencies
        working-directory: .base-source
        run: pnpm install --frozen-lockfile
      - name: Validate full pinned Base operating system
        working-directory: .base-source
        run: pnpm test
      - name: Upload Base adoption report
        uses: actions/upload-artifact@v4
        with:
          name: base-adoption-report
          path: project-operating-system-report.json
          if-no-files-found: error
