name: Data validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-game-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON game data
        run: python tools/validate_game_data.py
