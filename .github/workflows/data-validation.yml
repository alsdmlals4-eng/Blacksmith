name: Data validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-game-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout pinned Base
        uses: actions/checkout@v4
        with:
          repository: alsdmlals4-eng/Base
          ref: ee265576da7f67d3278f8099dd97d4e714ef0651
          path: base
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate JSON game data
        working-directory: project
        run: python tools/validate_game_data.py

      - name: Validate enhancement failure contract
        working-directory: project
        run: python tests/check_enhancement_failure_contract.py

      - name: Validate enhancement balance simulator contract
        working-directory: project
        run: |
          python -m unittest tests/test_enhancement_balance_simulator.py
          python tests/check_enhancement_balance_simulator_contract.py

      - name: Audit pristine Base adoption and project references
        working-directory: project
        run: |
          python tools/audit_project_operating_system.py \
            --base-root ../base \
            --report artifacts/base-adoption-report.json

      - name: Install pinned Base regression dependencies
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer fonts-nanum poppler-utils
          python -m pip install --disable-pip-version-check -r base/requirements-publication.txt
          cd base
          pnpm install --frozen-lockfile

      - name: Validate full pinned Base operating system
        working-directory: base
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: |
          python -m unittest \
            tests/test_documentation_governance.py \
            tests/test_skill_routing_governance.py \
            tests/test_design_document_publication_governance.py \
            tests/test_design_document_generation.py \
            tests/test_policy_driven_publication.py \
            tests/test_consolidated_skill_references.py \
            tests/test_reference_freshness.py \
            tests/test_skill_package_integrity.py \
            tests/test_project_skill_map_generation.py \
            tests/test_base_change_proposals.py \
            tests/test_deep_interview_contract.py \
            tests/test_ui_art_audit.py \
            tests/test_game_project_operating_system_structure.py \
            -v

      - name: Upload Base adoption report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: base-adoption-report
          path: project/artifacts/base-adoption-report.json
          if-no-files-found: error
