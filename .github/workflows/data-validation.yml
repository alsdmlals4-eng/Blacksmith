name: PR validation

# ACTIONS_BUDGET_HOLD:
# Automatic pull_request execution is intentionally disabled until the owner
# confirms that GitHub Actions minutes are available again. At that point add
# `pull_request:` beside `workflow_dispatch:`; the classifier below is already
# prepared for automatic document-only versus code routing.
on:
  workflow_dispatch:
    inputs:
      scope:
        description: Validation scope while automatic CI is paused
        required: true
        default: code
        type: choice
        options:
          - docs
          - code

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  classify:
    name: Classify validation scope
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select document or code validation
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SCOPE: ${{ inputs.scope }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "scope=${MANUAL_SCOPE:-code}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "$BASE_REF"
          code_changed=false
          while IFS= read -r path; do
            case "$path" in
              docs/*|README.md|*.md|"[기획서]"/*)
                ;;
              *)
                code_changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "origin/$BASE_REF"...HEAD)

          if [ "$code_changed" = true ]; then
            echo "scope=code" >> "$GITHUB_OUTPUT"
          else
            echo "scope=docs" >> "$GITHUB_OUTPUT"
          fi

  docs-validation:
    name: Ubuntu Python document validators
    needs: classify
    if: needs.classify.outputs.scope == 'docs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout pinned Base
        uses: actions/checkout@v4
        with:
          repository: alsdmlals4-eng/Base
          ref: 41a20584dd2ee51d917e5c9d7cab6838e1ceba7e
          path: base
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate document contracts
        working-directory: project
        run: |
          python -m unittest tests/test_no_merge_conflicts.py
          python tests/check_no_merge_conflicts.py .
          python tests/check_project_core_alignment.py
          python -m unittest tests/test_project_operating_system_audit_runner.py
          python tools/run_project_operating_system_audit.py \
            --base-root ../base \
            --report artifacts/base-adoption-report.json

  code-contracts:
    name: Ubuntu Python code contracts
    needs: classify
    if: needs.classify.outputs.scope == 'code'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout pinned Base
        uses: actions/checkout@v4
        with:
          repository: alsdmlals4-eng/Base
          ref: 41a20584dd2ee51d917e5c9d7cab6838e1ceba7e
          path: base
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run project contracts
        working-directory: project
        run: |
          python -m unittest tests/test_no_merge_conflicts.py
          python tests/check_no_merge_conflicts.py .
          python tools/validate_game_data.py
          python tools/validate_lifecycle_data.py
          python -m unittest tests/test_lifecycle_data_contract.py
          python tests/check_enhancement_failure_contract.py
          python -m unittest tests/test_enhancement_balance_simulator.py
          python tests/check_enhancement_balance_simulator_contract.py
          python tests/check_project_core_alignment.py
          python -m unittest tests/test_project_operating_system_audit_runner.py
          python tools/run_project_operating_system_audit.py \
            --base-root ../base \
            --report artifacts/base-adoption-report.json

  godot-validation:
    name: Ubuntu Godot contracts
    needs: classify
    if: needs.classify.outputs.scope == 'code'
    uses: ./.github/workflows/godot-validation.yml
