name: Materialize manual economy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".tmp_manual_economy/**"
      - ".github/workflows/materialize-manual-economy.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'fix/unify-manual-auto-economy'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply enhancement screen patch and verify
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .tmp_manual_economy/enhancement_screen.patch
          git apply .tmp_manual_economy/enhancement_screen.patch
          test "$(git hash-object scripts/ui/enhancement_screen.gd)" = "d66bebb277baf08292860d99c80e509ce1ad1c21"

          rm -rf .tmp_manual_economy
          rm -f .github/workflows/materialize-manual-economy.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "강화 화면을 공유 경제 거래에 연결"
          git push origin HEAD:${{ github.head_ref }}
