name: Full validation

# ACTIONS_BUDGET_HOLD:
# Keep this workflow manual-only until the owner confirms that GitHub Actions
# minutes are available. Then enable `push` for main and the nightly schedule
# documented in docs/CI_EXECUTION_POLICY.md.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-matrix:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    uses: ./.github/workflows/python-validation.yml
    with:
      scope: code
      runner: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      include-operating-audit: false

  base-governance:
    name: Ubuntu pinned Base governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout pinned Base
        uses: actions/checkout@v4
        with:
          repository: alsdmlals4-eng/Base
          ref: 41a20584dd2ee51d917e5c9d7cab6838e1ceba7e
          path: base
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Audit project references against pinned Base
        working-directory: project
        run: |
          python -m unittest tests/test_project_operating_system_audit_runner.py
          python tools/run_project_operating_system_audit.py --base-root ../base --report artifacts/base-adoption-report.json

      - name: Install pinned Base regression dependencies
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer fonts-nanum poppler-utils
          python -m pip install --disable-pip-version-check -r base/requirements-publication.txt
          cd base
          pnpm install --frozen-lockfile

      - name: Validate full pinned Base operating system once
        working-directory: base
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: |
          python -m unittest \
            tests/test_documentation_governance.py \
            tests/test_skill_routing_governance.py \
            tests/test_design_document_publication_governance.py \
            tests/test_design_document_generation.py \
            tests/test_policy_driven_publication.py \
            tests/test_consolidated_skill_references.py \
            tests/test_reference_freshness.py \
            tests/test_skill_package_integrity.py \
            tests/test_skill_system_coverage.py \
            tests/test_project_skill_map_generation.py \
            tests/test_base_change_proposals.py \
            tests/test_deep_interview_contract.py \
            tests/test_ui_art_audit.py \
            tests/test_game_project_operating_system_structure.py \
            -v

      - name: Upload Base adoption report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: base-adoption-failure-report
          path: project/artifacts/base-adoption-report.json
          if-no-files-found: warn

  godot-validation:
    name: Ubuntu Godot full suite
    uses: ./.github/workflows/godot-validation.yml
