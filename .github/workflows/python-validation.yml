name: Reusable Python validation

on:
  workflow_call:
    inputs:
      scope:
        description: docs or code
        required: true
        type: string
      runner:
        description: GitHub-hosted runner label
        required: false
        default: ubuntu-latest
        type: string
      python-version:
        description: Python version
        required: false
        default: "3.12"
        type: string
      include-operating-audit:
        description: Run the project-to-Base operating audit
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      scope:
        description: Validation scope
        required: true
        default: code
        type: choice
        options:
          - docs
          - code
      runner:
        description: Runner label
        required: true
        default: ubuntu-latest
        type: string
      python-version:
        description: Python version
        required: true
        default: "3.12"
        type: string
      include-operating-audit:
        description: Include project-to-Base audit
        required: true
        default: true
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ inputs.runner }}-${{ inputs.python-version }}-${{ inputs.scope }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: ${{ inputs.runner }} / Python ${{ inputs.python-version }} / ${{ inputs.scope }}
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout Blacksmith
        uses: actions/checkout@v4
        with:
          path: project

      - name: Checkout pinned Base
        if: inputs.include-operating-audit
        uses: actions/checkout@v4
        with:
          repository: alsdmlals4-eng/Base
          ref: 41a20584dd2ee51d917e5c9d7cab6838e1ceba7e
          path: base
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Reject unresolved merge conflicts
        working-directory: project
        run: |
          python -m unittest tests/test_no_merge_conflicts.py
          python tests/check_no_merge_conflicts.py .

      - name: Validate document and CI contracts
        working-directory: project
        run: |
          python tests/check_project_core_alignment.py
          python -m unittest tests/test_ci_workflow_structure.py

      - name: Validate project operating audit wrapper
        if: inputs.include-operating-audit
        working-directory: project
        run: |
          python -m unittest tests/test_project_operating_system_audit_runner.py
          python tools/run_project_operating_system_audit.py --base-root ../base --report artifacts/base-adoption-report.json

      - name: Validate game and lifecycle data
        if: inputs.scope == 'code'
        working-directory: project
        run: |
          python tools/validate_game_data.py
          python tools/validate_lifecycle_data.py
          python -m unittest tests/test_lifecycle_data_contract.py

      - name: Validate forging quality contract
        if: inputs.scope == 'code'
        working-directory: project
        run: python tests/check_forging_quality_contract.py

      - name: Validate enhancement failure contract
        if: inputs.scope == 'code'
        working-directory: project
        shell: bash
        run: |
          set +e
          python tests/check_enhancement_failure_contract.py > enhancement-failure-contract.log 2>&1
          status=$?
          cat enhancement-failure-contract.log
          exit "$status"

      - name: Upload enhancement failure diagnostics
        if: failure() && inputs.scope == 'code'
        uses: actions/upload-artifact@v4
        with:
          name: enhancement-failure-contract-log
          path: project/enhancement-failure-contract.log
          if-no-files-found: ignore

      - name: Validate enhancement balance simulator
        if: inputs.scope == 'code'
        working-directory: project
        run: python -m unittest tests/test_enhancement_balance_simulator.py

      - name: Validate enhancement balance simulator contract
        if: inputs.scope == 'code'
        working-directory: project
        run: python tests/check_enhancement_balance_simulator_contract.py
