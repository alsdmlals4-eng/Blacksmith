name: Reusable Godot validation

# This workflow no longer listens to pull_request or push directly. It is called
# once by the PR router or the full validation workflow, preventing duplicate
# Godot downloads and duplicate model-suite execution.
on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  headless-test:
    name: Godot 4.7.1 headless suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.7.1
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            "https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.7.1"
          unzip -q godot.zip
          mv Godot_v4.7.1-stable_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Import and parse project
        shell: bash
        run: |
          set +e
          ./godot --headless --editor --path . --quit 2>&1 | tee godot-import.log
          godot_status=${PIPESTATUS[0]}
          set -e
          if [ "$godot_status" -ne 0 ] || grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" godot-import.log; then
            echo "Godot import/parse reported an error."
            exit 1
          fi

      - name: Smoke test existing scenes
        shell: bash
        run: |
          set -euo pipefail
          for scene in \
            res://scenes/test/enhancement_test.tscn \
            res://scenes/main/main.tscn; do
            log_name=$(basename "$scene" .tscn)
            ./godot --headless --path . "$scene" --quit-after 2 2>&1 | tee "godot-${log_name}-smoke.log"
            if grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" "godot-${log_name}-smoke.log"; then
              echo "Scene smoke test failed: $scene"
              exit 1
            fi
          done

      - name: Run Godot model and integration suites
        shell: bash
        run: |
          set +e
          : > godot-test.log
          status=0

          run_test() {
            test_path="$1"
            marker="$2"
            echo "== $test_path ==" | tee -a godot-test.log
            ./godot --headless --path . --script "$test_path" >> godot-test.log 2>&1
            process_status=$?
            if [ "$process_status" -ne 0 ] || ! grep -q "$marker" godot-test.log; then
              echo "FAILED: $test_path (exit $process_status)" | tee -a godot-test.log
              status=1
            fi
          }

          run_test res://tests/unit/test_forging_session.gd "ForgingSession tests PASSED"
          run_test res://tests/unit/test_enhancement_session.gd "EnhancementSession tests PASSED"
          run_test res://tests/unit/test_workshop_resources.gd "WorkshopResources tests PASSED"
          run_test res://tests/unit/test_workshop_calendar.gd "WorkshopCalendar tests PASSED"
          run_test res://tests/unit/test_craftsmanship_grade_resolver.gd "CraftsmanshipGradeResolver tests PASSED"
          run_test res://tests/unit/test_customer_contract.gd "CustomerContract tests PASSED"
          run_test res://tests/unit/test_world_activity_resolver.gd "WorldActivityResolver tests PASSED"
          run_test res://tests/unit/test_equipment_world_registry.gd "EquipmentWorldRegistry tests PASSED"
          run_test res://tests/unit/test_poc_telemetry.gd "PocTelemetry tests PASSED"
          run_test res://tests/integration/test_manual_enhancement_economy.gd "Manual enhancement economy integration tests PASSED"
          run_test res://tests/integration/test_forging_quality_enhancement.gd "Forging quality enhancement integration tests PASSED"
          run_test res://tests/integration/test_workshop_action_atomicity.gd "Workshop action atomicity integration tests PASSED"
          run_test res://tests/integration/test_equipment_lifecycle_controller.gd "Equipment lifecycle controller integration tests PASSED"

          cat godot-test.log
          if grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" godot-test.log; then
            status=1
          fi
          exit "$status"

      - name: Upload failure logs only
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: godot-validation-failure-logs
          path: |
            godot-import.log
            godot-*-smoke.log
            godot-test.log
          if-no-files-found: warn
