name: Godot validation

on:
  pull_request:
    paths:
      - "project.godot"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "data/**"
      - "docs/**"
      - "skills/**"
      - ".github/workflows/godot-validation.yml"
      - "tools/**"
  push:
    branches: [main]

jobs:
  headless-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.7.1
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            "https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.7.1"
          unzip -q godot.zip
          mv Godot_v4.7.1-stable_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Import and parse project
        run: ./godot --headless --editor --path . --quit

      - name: Smoke test enhancement F5 scene
        run: ./godot --headless --path . res://scenes/test/enhancement_test.tscn --quit-after 2

      - name: Run model tests
        id: model_tests
        shell: bash
        run: |
          set +e
          : > godot-test.log

          echo "== ForgingSession ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/unit/test_forging_session.gd >> godot-test.log 2>&1
          forging_status=$?

          echo "== EnhancementSession ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/unit/test_enhancement_session.gd >> godot-test.log 2>&1
          enhancement_status=$?

          cat godot-test.log
          status=0
          grep -q "ForgingSession tests PASSED" godot-test.log || status=1
          grep -q "EnhancementSession tests PASSED (12 cases)" godot-test.log || status=1
          if [ "$forging_status" -ne 0 ] || [ "$enhancement_status" -ne 0 ]; then
            echo "Godot reported non-zero process status: forging=$forging_status enhancement=$enhancement_status"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate governance and game data
        run: |
          python tools/check_project_governance.py
          python tools/validate_game_data.py

      - name: Package Godot playtest project
        shell: bash
        run: |
          zip -r blacksmith-godot-playtest.zip \
            project.godot scenes scripts data tests docs README.md AGENTS.md "[기획서]" skills \
            -x ".godot/*" "*.import" "*.pdf"

      - name: Upload Godot playtest project
        uses: actions/upload-artifact@v4
        with:
          name: blacksmith-godot-playtest
          path: blacksmith-godot-playtest.zip
          if-no-files-found: error

      - name: Upload Godot test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-test-log
          path: godot-test.log
          if-no-files-found: error

      - name: Fail when model tests fail
        run: test "${{ steps.model_tests.outputs.status }}" -eq 0
