name: Godot validation

on:
  pull_request:
    paths:
      - "project.godot"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "data/**"
      - ".github/workflows/godot-validation.yml"
  push:
    branches: [main]

jobs:
  headless-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot 4.7.1
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            "https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.7.1"
          unzip -q godot.zip
          mv Godot_v4.7.1-stable_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Import and parse project
        run: ./godot --headless --editor --path . --quit

      - name: Run forging model tests
        id: forging_tests
        shell: bash
        run: |
          set +e
          ./godot --headless --path . --script res://tests/unit/test_forging_session.gd > godot-test.log 2>&1
          status=$?
          cat godot-test.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Godot test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-test-log
          path: godot-test.log
          if-no-files-found: error

      - name: Fail when forging tests fail
        shell: bash
        run: test "${{ steps.forging_tests.outputs.status }}" -eq 0

      - name: Validate JSON game data
        run: python tools/validate_game_data.py
