name: Godot validation

on:
  pull_request:
    paths:
      - "project.godot"
      - "scenes/**"
      - "scripts/**"
      - "tests/**"
      - "data/**"
      - ".github/workflows/godot-validation.yml"
      - "tools/**"
  push:
    branches: [main]

jobs:
  headless-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate forging quality contract
        run: python tests/check_forging_quality_contract.py

      - name: Download Godot 4.7.1
        shell: bash
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            "https://downloads.godotengine.org/?flavor=stable&platform=linux.64&slug=linux.x86_64.zip&version=4.7.1"
          unzip -q godot.zip
          mv Godot_v4.7.1-stable_linux.x86_64 godot
          chmod +x godot
          ./godot --version

      - name: Import and parse project
        shell: bash
        run: |
          set +e
          ./godot --headless --editor --path . --quit 2>&1 | tee godot-import.log
          godot_status=${PIPESTATUS[0]}
          set -e
          if [ "$godot_status" -ne 0 ] || grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" godot-import.log; then
            echo "Godot import/parse reported an error."
            exit 1
          fi

      - name: Smoke test enhancement scene
        shell: bash
        run: |
          set +e
          ./godot --headless --path . res://scenes/test/enhancement_test.tscn --quit-after 2 2>&1 | tee godot-enhancement-smoke.log
          godot_status=${PIPESTATUS[0]}
          set -e
          if [ "$godot_status" -ne 0 ] || grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" godot-enhancement-smoke.log; then
            echo "Enhancement scene smoke test reported an error."
            exit 1
          fi

      - name: Smoke test full forging flow scene
        shell: bash
        run: |
          set +e
          ./godot --headless --path . res://scenes/main/main.tscn --quit-after 2 2>&1 | tee godot-main-smoke.log
          godot_status=${PIPESTATUS[0]}
          set -e
          if [ "$godot_status" -ne 0 ] || grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" godot-main-smoke.log; then
            echo "Full forging flow scene smoke test reported an error."
            exit 1
          fi

      - name: Run model tests
        id: model_tests
        shell: bash
        run: |
          set +e
          : > godot-test.log

          echo "== ForgingSession ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/unit/test_forging_session.gd >> godot-test.log 2>&1
          forging_status=$?

          echo "== EnhancementSession ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/unit/test_enhancement_session.gd >> godot-test.log 2>&1
          enhancement_status=$?

          echo "== WorkshopResources ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/unit/test_workshop_resources.gd >> godot-test.log 2>&1
          workshop_status=$?

          echo "== ManualEnhancementEconomy ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/integration/test_manual_enhancement_economy.gd >> godot-test.log 2>&1
          manual_economy_status=$?

          echo "== ForgingQualityEnhancement ==" | tee -a godot-test.log
          ./godot --headless --path . --script res://tests/integration/test_forging_quality_enhancement.gd >> godot-test.log 2>&1
          forging_quality_status=$?

          cat godot-test.log
          status=0
          if ! grep -q "ForgingSession tests PASSED" godot-test.log; then
            status=1
          fi
          if ! grep -q "EnhancementSession tests PASSED" godot-test.log; then
            status=1
          fi
          if ! grep -q "WorkshopResources tests PASSED" godot-test.log; then
            status=1
          fi
          if ! grep -q "Manual enhancement economy integration tests PASSED" godot-test.log; then
            status=1
          fi
          if ! grep -q "Forging quality enhancement integration tests PASSED" godot-test.log; then
            status=1
          fi
          if [ "$forging_status" -ne 0 ] || [ "$enhancement_status" -ne 0 ] || [ "$workshop_status" -ne 0 ] || [ "$manual_economy_status" -ne 0 ] || [ "$forging_quality_status" -ne 0 ]; then
            echo "Godot reported non-zero test process status after PASS output: forging=$forging_status enhancement=$enhancement_status workshop=$workshop_status manual_economy=$manual_economy_status forging_quality=$forging_quality_status"
          fi
          if grep -Eq "SCRIPT ERROR:|Parse Error:|Compile Error:|ERROR:" godot-test.log; then
            echo "Godot test log contains script or runtime errors."
            status=1
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Package Godot playtest project
        shell: bash
        run: |
          zip -r blacksmith-godot-playtest.zip \
            project.godot \
            scenes \
            scripts \
            data \
            tests \
            docs/GODOT_PLAYTEST.md \
            docs/MVP-001_SCOPE.md \
            docs/MVP-002_SCOPE.md \
            README.md \
            -x ".godot/*" "*.import"

      - name: Upload Godot playtest project
        uses: actions/upload-artifact@v4
        with:
          name: blacksmith-godot-playtest
          path: blacksmith-godot-playtest.zip
          if-no-files-found: error

      - name: Upload Godot validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-validation-logs
          path: |
            godot-import.log
            godot-enhancement-smoke.log
            godot-main-smoke.log
            godot-test.log
          if-no-files-found: warn

      - name: Fail when model tests fail
        shell: bash
        run: test "${{ steps.model_tests.outputs.status }}" -eq 0

      - name: Validate JSON game data
        run: python tools/validate_game_data.py
