name: Materialize auto forge

# Triggered after registration on main.
# PR synchronize retry 1.
on:
  push:
    branches:
      - feat/auto-forging-overdrive-leap
    paths:
      - ".github/workflows/materialize-auto-forge.yml"

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/auto-forging-overdrive-leap
          fetch-depth: 0

      - name: Apply compressed patch and clean transport files
        shell: bash
        run: |
          set -euo pipefail
          cat .tmp_auto_forge/auto_forge_patch.part*.b64 | base64 -d | gzip -d > /tmp/auto_forge.patch
          git apply --3way /tmp/auto_forge.patch
          rm -rf .tmp_auto_forge
          rm -f .github/workflows/materialize-auto-forge.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "폭주 2단계 도약과 자동 단조 추가"
          git push origin HEAD:feat/auto-forging-overdrive-leap
